<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Lexis Hukuk Takvim</title>

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body.light {
      background: #ffffff;
      color: #111;
    }

    body.dark {
      background: #1e1e1e;
      color: #eee;
    }

    /* Takvim için stil düzenlemeleri */
    #calendar {
      max-width: 900px;
      margin: 40px auto;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    h1 {
      text-align: center;
    }
  </style>
</head>
<body class="light">

  <h1>Lexis Hukuk Takvim</h1>

  <!-- Tema değiştirme butonları -->
  <div style="text-align:center;">
    <button onclick="changeTheme('light')">Light Tema</button>
    <button onclick="changeTheme('dark')">Dark Tema</button>
  </div>

  <!-- Takvim divi -->
  <div id="calendar"></div>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <script>
    // Tema değiştirme fonksiyonu
    function changeTheme(theme) {
      document.body.className = theme;
    }

    // Örnek etkinlikler
    const events = [
      { title: 'Dava Takibi', start: '2026-03-17' },
      { title: 'Müvekkil Görüşmesi', start: '2026-03-17' },
      { title: 'Duruşma', start: '2026-03-17' },
      { title: 'Belgeleri Kontrol Et', start: '2026-03-18' },
      { title: 'Toplantı', start: '2026-03-18' },
      { title: 'Rapor Hazırlama', start: '2026-03-18' }
    ];

    // Takvimi oluştur
    document.addEventListener('DOMContentLoaded', function() {
      const calendarEl = document.getElementById('calendar');
      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        dayMaxEvents: true,       // +n olaylarını göster
        moreLinkClick: "popover", // popup aç
        events: events
      });
      calendar.render();
    });
  </script>

</body>
</html>
