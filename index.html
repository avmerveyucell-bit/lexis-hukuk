<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Lexis Hukuk</title>

  <!-- Mevcut CSS dosyalarını koru -->
  <link rel="stylesheet" href="style.css">

  <!-- FullCalendar CSS -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">

  <style>
    body.light { background: #ffffff; color: #111; }
    body.dark { background: #1e1e1e; color: #eee; }

    #calendar { max-width: 900px; margin: 40px auto; }

    button.theme-btn { margin: 5px; padding: 8px 12px; cursor: pointer; }
  </style>
</head>
<body class="light">

  <!-- Mevcut menü ve içerik korunuyor -->
  <header>
    <h1>Lexis Hukuk</h1>
    <nav>
      <a href="#">Ana Sayfa</a> |
      <a href="#">Dava Takibi</a> |
      <a href="#">Müvekkiller</a>
    </nav>
  </header>

  <main>
    <!-- Tema butonları -->
    <div style="text-align:center; margin:20px 0;">
      <button class="theme-btn" onclick="changeTheme('light')">Light Tema</button>
      <button class="theme-btn" onclick="changeTheme('dark')">Dark Tema</button>
    </div>

    <!-- Takvim divi -->
    <div id="calendar"></div>

    <!-- Mevcut içerik korunuyor -->
    <section>
      <h2>Hoşgeldiniz!</h2>
      <p>Burada hukuk ofisi bilgileriniz, duyurular ve tablolar görünecek.</p>
    </section>
  </main>

  <footer>
    <p>© 2026 Lexis Hukuk</p>
  </footer>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <script>
    // Tema değiştirme
    function changeTheme(theme) { document.body.className = theme; }

    // Örnek takvim etkinlikleri
    const events = [
      { title: 'Dava Takibi', start: '2026-03-17' },
      { title: 'Müvekkil Görüşmesi', start: '2026-03-17' },
      { title: 'Duruşma', start: '2026-03-17' },
      { title: 'Belgeleri Kontrol Et', start: '2026-03-18' },
      { title: 'Toplantı', start: '2026-03-18' },
      { title: 'Rapor Hazırlama', start: '2026-03-18' }
    ];

    // Takvimi oluştur
    document.addEventListener('DOMContentLoaded', function() {
      const calendarEl = document.getElementById('calendar');
      if(calendarEl){
        const calendar = new FullCalendar.Calendar(calendarEl, {
          initialView: 'dayGridMonth',
          dayMaxEvents: true,       // +n olaylarını göster
          moreLinkClick: "popover", // popup aç
          events: events
        });
        calendar.render();
      }
    });
  </script>

</body>
</html>
